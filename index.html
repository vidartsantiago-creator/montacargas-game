<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montacargas - Juego Isométrico</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Evitar scrollbars si el juego ocupa toda la pantalla */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* UI Overlay opcional si se necesita fuera del canvas */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Dejar pasar clicks al canvas */
            display: none; /* Se activa con JS si es necesario */
        }
    </style>
</head>
<body>

    <!-- Contenedor donde Phaser renderizará el juego -->
    <div id="game-container"></div>

    <!-- Capa UI opcional (no usada actualmente, pero disponible) -->
    <div id="ui-layer"></div>

    <!-- Cargar el script principal como módulo -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
